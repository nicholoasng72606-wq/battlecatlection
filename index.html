<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>貓咪圖鑑解析器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>
        🐱 貓咪圖鑑解析器
    </h1>
    <div class="sub">
        貼上「我的超激」與「我的傳稀」完整資料，已擁有的貓咪將以網格顯示。<br>
        <a href="https://github.com/nicholoasng72606-wq/battlecatlection" id="gitlink">點我回到GitHub</a>
    </div>

    <div class="card">
        <h2>📋 輸入資料區</h2>
        <textarea id="rawData" rows="10" placeholder='請貼上資料（包含「我的超激」與「我的傳稀」兩區塊）'></textarea>
        <div class="button-group">
            <button id="parseBtn">🔍 開始解析 </button>
            <button id="clearBtn" class="secondary">🗑️ 清空輸入</button>
            <button id="copyBtn" class="secondary">📋 複製 JSON </button>
            <button id="downloadBtn" class="secondary">💾 下載 JSON</button>
            <button id="copyttBtn" class="secondary">複製範例輸入</button>
            <button id="copytjBtn" class="secondary">複製範例JSON</button>
        </div>
    </div>

    <div class="card">
        <h2>📸 已擁有貓咪</h2>
        <div id="gridOutput">
            <div class="empty-tip">等待解析資料...</div>
        </div>
        <div id="warningArea" class="warning-log" style="display: none;"></div>
    </div>
    <footer>
        ⚡ 圖片使用 <code>https://battlecatsinfo.github.io/img/u/
    </footer>
</div>

<script src="script.js"></script>
</body>
</html>
